<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Estoque Virtual · Matriz Esportes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#0E1726; --navy:#15233B; --slate:#5B6678; --mute:#8A93A3;
    --paper:#F6F7F9; --card:#FFFFFF; --line:#E7EAEF; --line-2:#EFF1F5;
    --acc:#E0A100; --acc-ink:#23170A; --purple:#7C3AED;
    --green:#0CA678; --amber:#E0A100; --red:#C92A2A;
    --toph:82px;
  }
  [data-theme="dark"]{
    --ink:#E8EBF1; --navy:#D6DDEA; --slate:#9AA4B5; --mute:#828DA0;
    --paper:#0E131D; --card:#161B26; --line:#2A3242; --line-2:#222A37;
    --green:#34D399; --amber:#F4C430; --red:#F2868B;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 96px}
  .tnum{font-variant-numeric:tabular-nums}

  .topbar{display:flex;align-items:center;gap:12px;padding:18px 0;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:22;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .cms-logo{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;background:linear-gradient(135deg,#9B6BF0,#7C3AED);color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(124,58,237,.25)}
  .brand-txt{display:flex;flex-direction:column;line-height:1.18;min-width:0}
  .brand-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px;color:var(--ink)}
  .brand-sub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .spacer{flex:1}
  .btn{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--navy);border-radius:8px;padding:9px 15px;white-space:nowrap}
  .btn.primary{background:var(--purple);color:#fff;border-color:var(--purple)}
  .btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn:hover{filter:brightness(.98)}
  .btn:disabled{opacity:.45;cursor:default}
  .theme-btn{height:38px;display:inline-flex;align-items:center;gap:7px;padding:0 14px}
  .iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--card);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--navy)}
  .iconbtn:hover{filter:brightness(.97)}
  .iconbtn.trash{color:var(--red);border-color:color-mix(in srgb,var(--red) 35%,var(--line))}
  .iconbtn.trash:hover{background:color-mix(in srgb,var(--red) 8%,transparent)}
  .iconbtn.upload{color:var(--purple);border-color:color-mix(in srgb,var(--purple) 35%,var(--line))}
  .iconbtn.upload:hover{background:color-mix(in srgb,var(--purple) 8%,transparent)}

  .hero{padding:36px 0 24px;border-bottom:1px solid var(--line)}
  .hero h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(24px,3.6vw,34px);letter-spacing:-.02em;margin:0 0 8px}
  .hero .lede{color:var(--slate);margin:0;font-size:14.5px}

  .stickykpis{position:sticky;top:var(--toph);z-index:19;background:var(--paper);padding:16px 0;border-bottom:1px solid var(--line)}
  .ksum-row{display:flex;flex-wrap:wrap;gap:14px}
  .ksum{background:var(--card);border:1.5px solid color-mix(in srgb,var(--purple) 35%,var(--line));border-radius:12px;padding:14px 18px;min-width:140px;flex:1}
  .ksum .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .ksum .v{font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:700;margin-top:3px;color:var(--purple)}
  .ksum.warn{border-color:color-mix(in srgb,var(--red) 45%,var(--line))}
  .ksum.warn .v{color:var(--red)}

  .section-title{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:17px;margin:34px 0 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .section-title .badge{font-size:11px;font-weight:700;background:var(--red);color:#fff;border-radius:99px;padding:2px 9px}

  .pendfilter{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
  .pfchip{font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:600;padding:6px 13px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--slate);cursor:pointer}
  .pfchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

  .pendbulk{display:flex;align-items:center;gap:10px;background:color-mix(in srgb,var(--red) 8%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,var(--line));border-radius:10px;padding:10px 14px;margin-bottom:10px}
  .pendbulk span{font-size:13px;color:var(--navy);flex:1}

  .pend{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pend.tipo-remocao{border-left:4px solid var(--red)}
  .pend.tipo-novo{border-left:4px solid var(--purple)}
  .pend input[type=checkbox]{width:17px;height:17px;accent-color:var(--red);flex:none}
  .pend .tag{font-family:"Space Grotesk",sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-radius:5px;padding:3px 7px;flex:none}
  .pend .tag.novo{background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple)}
  .pend .tag.remocao{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)}
  .pend .info{flex:1;min-width:200px}
  .pend .info b{font-family:"Space Grotesk",sans-serif}
  .pend .info .sub{font-size:12px;color:var(--slate);margin-top:2px}
  .pend .nums{font-size:12.5px;color:var(--slate);font-family:"Space Grotesk",sans-serif}
  .pend .acts{display:flex;gap:8px}
  .pend .acts .btn{padding:7px 12px;font-size:12.5px}
  .pend.resolved{opacity:.5}
  .empty{color:var(--mute);font-size:13.5px;padding:16px 0}

  .vend{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin-top:16px;transition:border-color .15s,box-shadow .15s}
  .vend.open{border:2px solid var(--purple);box-shadow:0 0 0 3px color-mix(in srgb,var(--purple) 14%,transparent)}
  .vhead{display:flex;align-items:center;gap:16px;margin-bottom:6px;flex-wrap:wrap;cursor:pointer}
  .vindex{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 42%,transparent);background:color-mix(in srgb,var(--purple) 12%,transparent);border-radius:8px;width:34px;height:34px;display:grid;place-items:center;flex:none}
  .vtitle{flex:1;min-width:160px}
  .vtitle h2{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:600;margin:0}
  .vtitle .sub{font-size:12.5px;color:var(--slate)}
  .vkpi{text-align:right}
  .vkpi .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .vkpi .v{font-family:"Space Grotesk",sans-serif;font-size:20px;font-weight:700;line-height:1.1}
  .vkpi .v.stale{color:var(--red);font-size:12px;font-weight:600}
  .vchev{font-size:18px;color:var(--mute);transition:transform .15s}
  .vend.open .vchev{transform:rotate(180deg)}
  .linkrow{display:flex;align-items:center;gap:8px;margin:12px 0 4px;flex-wrap:wrap}
  .linkrow input{flex:1;min-width:200px;font-family:"Space Grotesk",sans-serif;font-size:12px;color:var(--slate);background:var(--line-2);border:1px solid var(--line);border-radius:7px;padding:7px 10px}
  .linkrow .btn{padding:7px 12px;font-size:12px}

  .vbody{display:none;margin-top:14px}
  .vend.open .vbody{display:block}
  .marcafilter{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
  .mchip{font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid var(--line);background:var(--paper);color:var(--slate);cursor:pointer}
  .mchip.on{background:var(--purple);color:#fff;border-color:var(--purple)}

  .bulkbar{display:none;align-items:center;gap:10px;background:color-mix(in srgb,var(--red) 8%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,var(--line));border-radius:10px;padding:10px 14px;margin-bottom:12px}
  .bulkbar.show{display:flex}
  .bulkbar span{font-size:13px;color:var(--navy);flex:1}

  .rtable{width:100%;overflow-x:auto}
  .rgrid-cols{grid-template-columns:28px 108px minmax(0,2fr) minmax(0,.8fr) minmax(0,.8fr) minmax(0,.7fr) minmax(0,.7fr) 76px}
  .rhead{display:grid;column-gap:12px;align-items:center;min-width:760px;position:sticky;top:var(--theadtop,170px);z-index:6;background:var(--card);padding:10px 0;border-bottom:2px solid var(--line);font-family:"Space Grotesk",sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--navy)}
  .rtable-grid{display:grid;column-gap:12px;row-gap:14px;align-items:center;min-width:760px;padding-top:10px}
  .rrow{display:contents;font-size:13px}
  .rdiv{grid-column:1/-1;height:1px;background:var(--line-2)}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--red);cursor:pointer}
  .rrow .thumb{position:relative;width:108px;height:108px;background:var(--line-2);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:8px;cursor:zoom-in}
  .rrow .thumb img{width:100%;height:100%;object-fit:contain}
  .rrow .thumb .ph{font-size:9px;color:var(--mute);font-family:"Space Grotesk",sans-serif;text-align:center}
  .rrow .desccell{display:flex;align-items:center;gap:9px}
  .rrow .cor{color:var(--purple);font-weight:600;font-size:12px}
  .rrow .tnum{text-align:right}
  .rrow .rowacts{display:flex;gap:6px}

  .cf-bg{position:fixed;inset:0;background:rgba(10,14,22,.55);display:flex;align-items:center;justify-content:center;z-index:130;padding:20px}
  .cf-bg[hidden]{display:none}
  .cf-box{background:var(--card);border-radius:16px;max-width:400px;width:100%;padding:24px;border:1px solid var(--line)}
  .cf-box h2{font-family:"Space Grotesk",sans-serif;font-size:17px;margin:0 0 8px}
  .cf-box p{font-size:13.5px;color:var(--slate);margin:0}
  .cf-box .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  .zoom-bg{position:fixed;inset:0;background:rgba(10,14,22,.75);display:flex;align-items:center;justify-content:center;z-index:120;padding:30px}
  .zoom-bg[hidden]{display:none}
  .zoom-box{max-width:520px;width:100%;background:var(--card);border-radius:16px;padding:16px;text-align:center}
  .zoom-box img{max-width:100%;max-height:60vh;object-fit:contain}
  .zoom-box .cap{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;margin-top:10px}
  .zoom-box .close{margin-top:14px}

  .totop{position:fixed;right:22px;bottom:26px;height:44px;border-radius:999px;border:none;background:var(--purple);color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13px;box-shadow:0 4px 14px rgba(124,58,237,.35);cursor:pointer;display:none;align-items:center;gap:7px;padding:0 16px;z-index:40}
  .totop.show{display:flex}
  .totop:hover{filter:brightness(1.06)}

  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--mute);font-size:12px}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="cms-logo">CMS</div>
      <div class="brand-txt"><span class="brand-name">CMS Representações</span><span class="brand-sub">Estoque Virtual · Matriz Esportes · Admin</span></div>
    </div>
    <span class="spacer"></span>
    <button class="btn" id="refreshBtn" title="Recarregar os dados mais recentes">Atualizar</button>
    <button class="btn primary" id="exportBtn" title="Baixar planilha .xlsx consolidada">Exportar .xlsx</button>
    <button class="theme-btn btn" id="fsBtn" type="button" title="Ativar/sair da tela cheia"><span id="fsIcon">⛶</span> Tela cheia</button>
    <button class="theme-btn btn" id="themeBtn" type="button" title="Alternar tema claro/escuro"><span id="themeIcon">◐</span> Tema</button>
  </div>

  <header class="hero">
    <h1>Estoque Virtual · Matriz Esportes</h1>
    <p class="lede">Sellout reportado por cada loja do grupo — estoque atual e vendas, por marca e produto.</p>
  </header>

  <div class="stickykpis"><div class="ksum-row" id="kpis"></div></div>

  <div class="section-title">Pendências das lojas <span class="badge" id="pendBadge" hidden>0</span></div>
  <div class="pendfilter" id="pendFilter">
    <button class="pfchip on" data-f="todos" title="Ver tudo">Todos</button>
    <button class="pfchip" data-f="novo" title="Produtos que as lojas relataram fora da lista">Novo produto</button>
    <button class="pfchip" data-f="remocao" title="Produtos que as lojas marcaram como inexistentes">Não existe</button>
  </div>
  <div id="pendToggleWrap"></div>
  <div id="pendBulkWrap"></div>
  <div id="pendList"></div>

  <div class="section-title" style="margin-top:38px">Lojas</div>
  <div id="lojasList"></div>

  <footer>Estoque Virtual · CMS Representações · ferramenta interna</footer>
</div>

<div class="cf-bg" id="cfBg" hidden>
  <div class="cf-box">
    <h2 id="cfTitle">Confirmar</h2>
    <p id="cfMsg"></p>
    <div class="actions">
      <button class="btn" id="cfCancel" type="button">Cancelar</button>
      <button class="btn danger" id="cfOk" type="button">Excluir</button>
    </div>
  </div>
</div>

<div class="zoom-bg" id="zoomBg" hidden>
  <div class="zoom-box">
    <img id="zoomImg" src="" alt="">
    <div class="cap" id="zoomCap"></div>
    <button class="btn close" id="zoomClose" type="button" title="Fechar imagem ampliada">Fechar</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<button class="totop" id="totopBtn" type="button" title="Voltar ao topo da página">↑ Voltar ao topo</button>

<script>
const WORKER_URL = 'https://repasse-worker-cms.marcosrep-cms.workers.dev';
const IMG_BASE = '../imagens_olympikus/';
const LOJA_PAGE = 'loja.html';
const MARCA_LABELS = { 'OLY FTW': 'Olympikus Tênis', 'OLY CHI': 'Olympikus Chinelo', 'UA FTW': 'Under Armour Tênis' };

let DATA = { lojas: [], pendentes: [] };
let pendFilter = 'todos';
let mostrarResolvidos = false;
let pendingUploadTarget = null; // { artigo, cor, row }

function $(id){ return document.getElementById(id); }
function imgUrl(artigo, cor){ return IMG_BASE + encodeURIComponent(artigo) + '_' + encodeURIComponent(cor) + '.jpg'; }
function fmtData(iso){
  if(!iso) return null;
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}
function toast(msg, isErr){
  let t = $('adminToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'adminToast';
    t.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:600;padding:11px 20px;border-radius:99px;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = isErr ? 'var(--red)' : 'var(--ink)';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('matriz-theme', t); }
(function initTheme(){
  const saved = localStorage.getItem('matriz-theme');
  applyTheme(saved || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
})();
$('themeBtn').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
};

$('fsBtn').onclick = () => {
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else{ document.exitFullscreen().catch(()=>{}); }
};
document.addEventListener('fullscreenchange', () => {
  $('fsIcon').textContent = document.fullscreenElement ? '⛝' : '⛶';
});

window.addEventListener('scroll', () => {
  $('totopBtn').classList.toggle('show', window.scrollY > 420);
});
$('totopBtn').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

function openZoom(artigo, cor, cap){
  $('zoomImg').src = imgUrl(artigo, cor) + '?v=' + Date.now();
  $('zoomCap').textContent = cap;
  $('zoomBg').hidden = false;
}
$('zoomClose').onclick = () => { $('zoomBg').hidden = true; };
$('zoomBg').onclick = e => { if(e.target === $('zoomBg')) $('zoomBg').hidden = true; };

// ---------- modal de confirmação (mesmo padrão visual do site) ----------
function askConfirm(title, msg, okLabel){
  return new Promise(resolve => {
    $('cfTitle').textContent = title;
    $('cfMsg').textContent = msg;
    $('cfOk').textContent = okLabel || 'Excluir';
    $('cfBg').hidden = false;
    const cleanup = (result) => {
      $('cfBg').hidden = true;
      $('cfOk').onclick = null; $('cfCancel').onclick = null;
      resolve(result);
    };
    $('cfOk').onclick = () => cleanup(true);
    $('cfCancel').onclick = () => cleanup(false);
  });
}

async function callWorker(body){
  const res = await fetch(WORKER_URL, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok || data.success === false) throw new Error(data.error || ('Erro ' + res.status));
  return data;
}

async function load(){
  try{
    const { data } = await callWorker({ action: 'getMatrizEstoque' });
    DATA = data && typeof data === 'object' ? data : { lojas: [], pendentes: [] };
    render();
  }catch(e){
    console.error(e);
    alert('Não foi possível carregar os dados: ' + e.message);
  }
}
$('refreshBtn').onclick = load;

function render(){
  renderKpis();
  renderPendentes();
  renderLojas();
  updateStickyOffsets();
}

function updateStickyOffsets(){
  const topbar = document.querySelector('.topbar');
  const kpis = document.querySelector('.stickykpis');
  const h = (topbar ? topbar.offsetHeight : 0) + (kpis ? kpis.offsetHeight : 0);
  document.documentElement.style.setProperty('--theadtop', h + 'px');
}
window.addEventListener('resize', updateStickyOffsets);

function renderKpis(lojaFoco){
  const lojas = DATA.lojas || [];

  if(lojaFoco){
    const totalItensLoja = Object.values(lojaFoco.marcas||{}).reduce((s,arr)=>s+arr.length,0);
    const pendLoja = (DATA.pendentes||[]).filter(p => p.status === 'pendente' && p.lojaCodigo === lojaFoco.codigo).length;
    const vendaTotal = Object.values(lojaFoco.marcas||{}).reduce((s,arr)=>s+arr.reduce((s2,it)=>s2+(Number(it.venda)||0),0),0);
    $('kpis').innerHTML = `
      <div class="ksum"><div class="l">Loja em foco</div><div class="v" style="font-size:18px">${lojaFoco.nome}</div></div>
      <div class="ksum"><div class="l">Itens desta loja</div><div class="v tnum">${totalItensLoja}</div></div>
      <div class="ksum"><div class="l">Venda total (desta loja)</div><div class="v tnum">${vendaTotal}</div></div>
      <div class="ksum ${pendLoja?'warn':''}"><div class="l">Pendências desta loja</div><div class="v tnum">${pendLoja}</div></div>
    `;
    return;
  }

  const totalItens = lojas.reduce((s,l) => s + Object.values(l.marcas||{}).reduce((s2,arr)=>s2+arr.length,0), 0);
  const pendAbertos = (DATA.pendentes||[]).filter(p => p.status === 'pendente').length;
  const naoAtualizadas = lojas.filter(l => !l.ultimaAtualizacaoLoja).length;

  $('kpis').innerHTML = `
    <div class="ksum"><div class="l">Lojas</div><div class="v tnum">${lojas.length}</div></div>
    <div class="ksum"><div class="l">Itens cadastrados</div><div class="v tnum">${totalItens}</div></div>
    <div class="ksum ${pendAbertos?'warn':''}"><div class="l">Pendências abertas</div><div class="v tnum">${pendAbertos}</div></div>
    <div class="ksum ${naoAtualizadas?'warn':''}"><div class="l">Lojas sem envio</div><div class="v tnum">${naoAtualizadas}</div></div>
  `;
}

// ---------- pendências ----------
$('pendFilter').querySelectorAll('.pfchip').forEach(chip => {
  chip.onclick = () => {
    pendFilter = chip.dataset.f;
    $('pendFilter').querySelectorAll('.pfchip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    renderPendentes();
  };
});

function renderPendentes(){
  const all = (DATA.pendentes || []).slice().sort((a,b) => (b.criadoEm||'').localeCompare(a.criadoEm||''));
  const abertos = all.filter(p => p.status === 'pendente');
  $('pendBadge').hidden = abertos.length === 0;
  $('pendBadge').textContent = abertos.length;

  let pend = pendFilter === 'todos' ? all : all.filter(p => (p.tipo || 'novo') === pendFilter);
  const resolvidosNaLista = pend.filter(p => p.status !== 'pendente').length;
  if(!mostrarResolvidos) pend = pend.filter(p => p.status === 'pendente');
  const pendAbertosNaLista = pend.filter(p => p.status === 'pendente');

  $('pendToggleWrap').innerHTML = resolvidosNaLista ? `
    <button class="pfchip" id="pendToggleResolvidos" style="margin-bottom:14px">${mostrarResolvidos ? '▾ Ocultar resolvidos' : '▸ Mostrar resolvidos'} (${resolvidosNaLista})</button>
  ` : '';
  const toggleBtn = $('pendToggleResolvidos');
  if(toggleBtn) toggleBtn.onclick = () => { mostrarResolvidos = !mostrarResolvidos; renderPendentes(); };

  $('pendBulkWrap').innerHTML = pendAbertosNaLista.length ? `
    <div class="pendbulk" id="pendBulkBar" style="display:none">
      <input type="checkbox" id="pendSelectAll">
      <span id="pendBulkCount">0 selecionado(s)</span>
      <button class="btn primary" id="pendBulkAprovar" title="Cadastros são marcados como cadastrados; sinalizações de \"não existe\" são removidas do catálogo">Aprovar selecionados</button>
      <button class="btn" id="pendBulkRejeitar">Rejeitar selecionados</button>
    </div>` : '';

  if(pend.length === 0){
    $('pendList').innerHTML = `<div class="empty">Nenhuma pendência ${pendFilter!=='todos' ? 'deste tipo' : ''} no momento.</div>`;
    return;
  }

  $('pendList').innerHTML = pend.map(p => {
    const isRemocao = p.tipo === 'remocao';
    const marcaLabel = MARCA_LABELS[p.marca] || p.marca;
    const statusTxt = p.status === 'aprovado' ? (isRemocao ? 'Removido do catálogo' : 'Cadastrado') : 'Rejeitado';
    const showCheckbox = p.status === 'pendente';
    return `
    <div class="pend tipo-${isRemocao?'remocao':'novo'} ${p.status!=='pendente'?'resolved':''}" data-id="${p.id}">
      ${showCheckbox ? `<input type="checkbox" class="pend-check" data-id="${p.id}">` : ''}
      <span class="tag ${isRemocao?'remocao':'novo'}">${isRemocao ? 'Não existe' : 'Novo produto'}</span>
      <div class="info">
        <b>${p.descricao} — ${p.cor}</b>
        <div class="sub">${p.lojaNome} · ${marcaLabel} · Artigo ${p.artigo}${p.status!=='pendente' ? ' · ' + statusTxt : ''}</div>
      </div>
      ${isRemocao ? '' : `<div class="nums tnum">Estoque: ${p.estoqueAtual ?? 0} · Venda: ${p.venda ?? 0}</div>`}
      ${p.status === 'pendente' ? `
      <div class="acts">
        <button class="btn primary" data-act="aprovar" title="${isRemocao ? 'Remover este item do catálogo da loja' : 'Marcar como já cadastrado corretamente'}">${isRemocao ? 'Confirmar remoção' : 'Marcar cadastrado'}</button>
        <button class="btn" data-act="rejeitar" title="${isRemocao ? 'Manter o item no catálogo da loja' : 'Descartar esse pedido de cadastro'}">${isRemocao ? 'Manter no catálogo' : 'Rejeitar'}</button>
      </div>` : ''}
    </div>
  `;
  }).join('');

  $('pendList').querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = async () => {
      const row = btn.closest('.pend');
      const id = row.dataset.id;
      const isRemocao = row.classList.contains('tipo-remocao');
      const status = btn.dataset.act === 'aprovar' ? 'aprovado' : 'rejeitado';
      if(status === 'aprovado' && isRemocao){
        const ok = await askConfirm('Remover produto do catálogo', 'Isso vai excluir este item da lista da loja de vez. Confirma?', 'Remover');
        if(!ok) return;
      }
      btn.closest('.acts').querySelectorAll('button').forEach(b => b.disabled = true);
      try{
        await callWorker({ action: 'resolverMatrizPendente', id, status });
        await load();
        toast('Pendência resolvida.');
      }catch(e){
        alert('Erro: ' + e.message);
      }
    };
  });

  if(pendAbertosNaLista.length){
    const bar = $('pendBulkBar');
    const checks = () => Array.from($('pendList').querySelectorAll('.pend-check'));
    function updateBar(){
      const sel = checks().filter(c => c.checked);
      bar.style.display = sel.length ? 'flex' : 'none';
      $('pendBulkCount').textContent = sel.length + ' selecionado(s)';
    }
    $('pendSelectAll').onchange = e => { checks().forEach(c => c.checked = e.target.checked); updateBar(); };
    checks().forEach(c => c.onchange = updateBar);

    async function processarSelecionados(status){
      const ids = checks().filter(c => c.checked).map(c => c.dataset.id);
      if(!ids.length) return;
      const selecionados = pend.filter(p => ids.includes(p.id));
      const nNovo = selecionados.filter(p => p.tipo !== 'remocao').length;
      const nRemocao = selecionados.filter(p => p.tipo === 'remocao').length;
      let msg;
      if(status === 'aprovado'){
        const partes = [];
        if(nNovo) partes.push(`${nNovo} produto(s) novo(s) marcado(s) como cadastrado(s)`);
        if(nRemocao) partes.push(`${nRemocao} produto(s) removido(s) do catálogo (sinalizados como inexistentes)`);
        msg = 'Isso vai processar: ' + partes.join(' e ') + '. Confirma?';
      }else{
        msg = `Isso vai rejeitar ${ids.length} pendência(s) selecionada(s), sem alterar o catálogo. Confirma?`;
      }
      const ok = await askConfirm(status === 'aprovado' ? 'Aprovar selecionados' : 'Rejeitar selecionados', msg, status === 'aprovado' ? 'Confirmar' : 'Rejeitar todos');
      if(!ok) return;
      $('pendBulkAprovar').disabled = true; $('pendBulkRejeitar').disabled = true;
      try{
        for(const id of ids){
          await callWorker({ action: 'resolverMatrizPendente', id, status });
        }
        await load();
        toast(ids.length + ' pendência(s) processada(s).');
      }catch(e){
        alert('Erro: ' + e.message);
      }
    }
    $('pendBulkAprovar').onclick = () => processarSelecionados('aprovado');
    $('pendBulkRejeitar').onclick = () => processarSelecionados('rejeitado');
  }
}

// ---------- lojas / catálogo ----------
function renderLojas(){
  const lojas = DATA.lojas || [];
  $('lojasList').innerHTML = lojas.map((l, i) => {
    const totalItens = Object.values(l.marcas||{}).reduce((s,arr)=>s+arr.length,0);
    const link = new URL(LOJA_PAGE, location.href).toString() + '?token=' + encodeURIComponent(l.token);
    const marcas = Object.keys(l.marcas || {});
    return `
    <div class="vend" id="vend-${i}">
      <div class="vhead" data-toggle="${i}" title="Clique para expandir/recolher os produtos desta loja">
        <div class="vindex tnum">${String(i+1).padStart(2,'0')}</div>
        <div class="vtitle"><h2>${l.nome}</h2><div class="sub">${l.cidade || ''}</div></div>
        <div class="vkpi"><div class="l">Itens</div><div class="v tnum">${totalItens}</div></div>
        <div class="vkpi">
          <div class="l">Último envio</div>
          <div class="v ${l.ultimaAtualizacaoLoja?'':'stale'}">${l.ultimaAtualizacaoLoja ? fmtData(l.ultimaAtualizacaoLoja) : 'Nunca enviado'}</div>
        </div>
        <div class="vchev">▾</div>
      </div>
      <div class="linkrow">
        <input readonly value="${link}" title="Link exclusivo desta loja">
        <button class="btn" data-copy="${link}" title="Copiar o link desta loja para a área de transferência">Copiar link</button>
      </div>
      <div class="vbody">
        <div class="marcafilter" id="mf-${i}">
          ${marcas.map((m,mi) => `<button class="mchip ${mi===0?'on':''}" data-marca="${m}" title="Ver produtos de ${MARCA_LABELS[m]||m}">${MARCA_LABELS[m]||m}</button>`).join('')}
        </div>
        <div class="bulkbar" id="bulk-${i}">
          <input type="checkbox" id="selall-${i}">
          <span id="bulkcount-${i}">0 selecionado(s)</span>
          <button class="btn danger" id="bulkdel-${i}">Excluir selecionados</button>
        </div>
        <div class="rtable" id="rt-${i}"></div>
      </div>
    </div>`;
  }).join('');

  lojas.forEach((l, i) => {
    $('vend-'+i).querySelector('[data-toggle]').onclick = () => {
      const jaAberta = $('vend-'+i).classList.contains('open');
      lojas.forEach((_, j) => $('vend-'+j).classList.remove('open'));
      if(jaAberta){
        renderKpis();
      }else{
        $('vend-'+i).classList.add('open');
        renderTabelaLoja(i, l, Object.keys(l.marcas||{})[0]);
        renderKpis(l);
      }
      updateStickyOffsets();
    };
    $('mf-'+i).querySelectorAll('.mchip').forEach(chip => {
      chip.onclick = () => {
        $('mf-'+i).querySelectorAll('.mchip').forEach(c => c.classList.remove('on'));
        chip.classList.add('on');
        renderTabelaLoja(i, l, chip.dataset.marca);
      };
    });
  });

  $('lojasList').querySelectorAll('[data-copy]').forEach(btn => {
    btn.onclick = async () => {
      try{ await navigator.clipboard.writeText(btn.dataset.copy); btn.textContent = 'Copiado!'; setTimeout(()=>btn.textContent='Copiar link',1500); }
      catch(_){ /* clipboard indisponível */ }
    };
  });
}

function renderTabelaLoja(i, loja, marca){
  const itens = (loja.marcas[marca] || []);
  $('rt-'+i).innerHTML = `
    <div class="rhead rgrid-cols">
      <input type="checkbox" id="rowselall-${i}">
      <div>Imagem</div><div>Produto</div><div>Artigo</div><div>Cor</div><div class="tnum">Venda</div><div class="tnum">Estoque</div><div>Ações</div>
    </div>
    <div class="rtable-grid rgrid-cols">
    ${itens.map(it => `
      <div class="rrow" data-id="${it.id}">
        <input type="checkbox" class="row-check" data-id="${it.id}">
        <div class="thumb" data-artigo="${it.artigo}" data-cor="${it.cor}" data-cap="${it.descricao} · ${it.cor} · Artigo ${it.artigo}" title="Clique para ampliar">
          <img src="${imgUrl(it.artigo,it.cor)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=&quot;ph&quot;>Sem imagem</span>'">
        </div>
        <div class="desccell">${it.descricao}</div>
        <div class="tnum">${it.artigo}</div>
        <div class="cor">${it.cor}</div>
        <div class="tnum">${it.venda ?? 0}</div>
        <div class="tnum">${it.estoqueAtual ?? 0}</div>
        <div class="rowacts">
          <button class="iconbtn upload" data-upload="${it.id}" title="Adicionar/trocar imagem deste produto">📷</button>
          <button class="iconbtn trash" data-del="${it.id}" title="Excluir este produto do catálogo da loja">🗑</button>
        </div>
      </div>
      <div class="rdiv"></div>
    `).join('')}
    </div>

  `;

  $('rt-'+i).querySelectorAll('.thumb').forEach(t => {
    t.onclick = () => openZoom(t.dataset.artigo, t.dataset.cor, t.dataset.cap);
  });

  const checks = () => Array.from($('rt-'+i).querySelectorAll('.row-check'));
  function updateBulk(){
    const sel = checks().filter(c => c.checked);
    $('bulk-'+i).classList.toggle('show', sel.length > 0);
    $('bulkcount-'+i).textContent = sel.length + ' selecionado(s)';
  }
  $('rowselall-'+i).onchange = e => { checks().forEach(c => c.checked = e.target.checked); $('selall-'+i).checked = e.target.checked; updateBulk(); };
  $('selall-'+i).onchange = e => { checks().forEach(c => c.checked = e.target.checked); $('rowselall-'+i).checked = e.target.checked; updateBulk(); };
  checks().forEach(c => c.onchange = updateBulk);

  $('bulkdel-'+i).onclick = async () => {
    const ids = checks().filter(c => c.checked).map(c => c.dataset.id);
    if(!ids.length) return;
    const ok = await askConfirm('Excluir produtos selecionados', `Isso vai excluir ${ids.length} produto(s) do catálogo de ${loja.nome}. Essa ação não pode ser desfeita. Confirma?`, 'Excluir');
    if(!ok) return;
    $('bulkdel-'+i).disabled = true;
    try{
      await callWorker({ action: 'deleteMatrizItens', lojaCodigo: loja.codigo, marca, itemIds: ids });
      await load();
      const novoIdx = (DATA.lojas||[]).findIndex(l => l.codigo === loja.codigo);
      if(novoIdx > -1){ $('vend-'+novoIdx).classList.add('open'); renderTabelaLoja(novoIdx, DATA.lojas[novoIdx], marca); renderKpis(DATA.lojas[novoIdx]); }
      toast(ids.length + ' produto(s) excluído(s).');
    }catch(e){
      alert('Erro: ' + e.message);
    }
  };

  $('rt-'+i).querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.del;
      const item = itens.find(it => it.id === id);
      const ok = await askConfirm('Excluir produto', `Excluir "${item.descricao} — ${item.cor}" do catálogo de ${loja.nome}? Essa ação não pode ser desfeita.`, 'Excluir');
      if(!ok) return;
      btn.disabled = true;
      try{
        await callWorker({ action: 'deleteMatrizItens', lojaCodigo: loja.codigo, marca, itemIds: [id] });
        await load();
        const novoIdx = (DATA.lojas||[]).findIndex(l => l.codigo === loja.codigo);
        if(novoIdx > -1){ $('vend-'+novoIdx).classList.add('open'); renderTabelaLoja(novoIdx, DATA.lojas[novoIdx], marca); renderKpis(DATA.lojas[novoIdx]); }
        toast('Produto excluído.');
      }catch(e){
        alert('Erro: ' + e.message);
        btn.disabled = false;
      }
    };
  });

  $('rt-'+i).querySelectorAll('[data-upload]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.upload;
      const item = itens.find(it => it.id === id);
      pendingUploadTarget = { artigo: item.artigo, cor: item.cor, row: btn.closest('.rrow') };
      $('fileInput').click();
    };
  });
}

$('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if(!file || !pendingUploadTarget) return;
  const { artigo, cor, row } = pendingUploadTarget;
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const nomeArquivo = `${artigo}_${cor}.${ext === 'png' ? 'jpg' : ext}`;
  const btn = row.querySelector('[data-upload]');
  btn.disabled = true;
  btn.textContent = '⏳';
  try{
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    await callWorker({ action: 'uploadMatrizImagem', nomeArquivo, base64 });
    row.querySelector('.thumb').innerHTML = `<img src="${imgUrl(artigo,cor)}?v=${Date.now()}">`;
    toast('Imagem enviada com sucesso!');
  }catch(err){
    toast('Erro ao enviar imagem: ' + err.message, true);
  }finally{
    btn.disabled = false;
    btn.textContent = '📷';
    pendingUploadTarget = null;
  }
};

$('exportBtn').onclick = () => {
  const rows = [];
  (DATA.lojas || []).forEach(l => {
    Object.entries(l.marcas || {}).forEach(([marca, itens]) => {
      itens.forEach(it => {
        rows.push({
          Loja: l.nome, Cidade: l.cidade, Marca: MARCA_LABELS[marca] || marca, Artigo: it.artigo,
          Descrição: it.descricao, Cor: it.cor, 'Estoque atual': it.estoqueAtual ?? 0,
          Venda: it.venda ?? 0, 'Último envio da loja': l.ultimaAtualizacaoLoja ? fmtData(l.ultimaAtualizacaoLoja) : ''
        });
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Estoque Matriz Esportes');
  const hoje = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `estoque_matriz_esportes_${hoje}.xlsx`);
};

load();
</script>
