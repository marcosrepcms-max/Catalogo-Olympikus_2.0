<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Estoque Virtual · Matriz Esportes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#0E1726; --navy:#15233B; --slate:#5B6678; --mute:#8A93A3;
    --paper:#F6F7F9; --card:#FFFFFF; --line:#E7EAEF; --line-2:#EFF1F5;
    --acc:#E0A100; --acc-ink:#23170A;
    --green:#0CA678; --amber:#E0A100; --red:#C92A2A; --purple:#7C3AED;
    --toph:82px;
  }
  [data-theme="dark"]{
    --ink:#E8EBF1; --navy:#D6DDEA; --slate:#9AA4B5; --mute:#828DA0;
    --paper:#0E131D; --card:#161B26; --line:#2A3242; --line-2:#222A37;
    --green:#34D399; --amber:#F4C430; --red:#F2868B;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 96px}
  .tnum{font-variant-numeric:tabular-nums}

  .topbar{display:flex;align-items:center;gap:12px;padding:18px 0;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:20}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .cms-logo{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;background:linear-gradient(135deg,#9B6BF0,#7C3AED);color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(124,58,237,.25)}
  .brand-txt{display:flex;flex-direction:column;line-height:1.18;min-width:0}
  .brand-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px;color:var(--ink)}
  .brand-sub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .spacer{flex:1}
  .btn{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--navy);border-radius:8px;padding:9px 15px}
  .btn.primary{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
  .btn:hover{filter:brightness(.98)}
  .theme-btn{width:38px;height:38px;display:grid;place-items:center;padding:0}

  .hero{padding:36px 0 24px;border-bottom:1px solid var(--line)}
  .hero h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(24px,3.6vw,34px);letter-spacing:-.02em;margin:0 0 8px}
  .hero .lede{color:var(--slate);margin:0;font-size:14.5px}

  .ksum-row{display:flex;flex-wrap:wrap;gap:14px;margin:22px 0 0}
  .ksum{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;min-width:140px;flex:1}
  .ksum .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .ksum .v{font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:700;margin-top:3px}
  .ksum.warn .v{color:var(--red)}

  .section-title{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:17px;margin:34px 0 14px;display:flex;align-items:center;gap:10px}
  .section-title .badge{font-size:11px;font-weight:700;background:var(--red);color:#fff;border-radius:99px;padding:2px 9px}

  .pend{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pend .info{flex:1;min-width:200px}
  .pend .info b{font-family:"Space Grotesk",sans-serif}
  .pend .info .sub{font-size:12px;color:var(--slate);margin-top:2px}
  .pend .nums{font-size:12.5px;color:var(--slate);font-family:"Space Grotesk",sans-serif}
  .pend .acts{display:flex;gap:8px}
  .pend .acts .btn{padding:7px 12px;font-size:12.5px}
  .pend.resolved{opacity:.5}
  .empty{color:var(--mute);font-size:13.5px;padding:16px 0}

  .vend{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin-top:16px}
  .vhead{display:flex;align-items:center;gap:16px;margin-bottom:6px;flex-wrap:wrap;cursor:pointer}
  .vindex{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 42%,transparent);background:color-mix(in srgb,var(--acc) 12%,transparent);border-radius:8px;width:34px;height:34px;display:grid;place-items:center;flex:none}
  .vtitle{flex:1;min-width:160px}
  .vtitle h2{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:600;margin:0}
  .vtitle .sub{font-size:12.5px;color:var(--slate)}
  .vkpi{text-align:right}
  .vkpi .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .vkpi .v{font-family:"Space Grotesk",sans-serif;font-size:20px;font-weight:700;line-height:1.1}
  .vkpi .v.stale{color:var(--red);font-size:12px;font-weight:600}
  .vchev{font-size:18px;color:var(--mute);transition:transform .15s}
  .vend.open .vchev{transform:rotate(180deg)}
  .linkrow{display:flex;align-items:center;gap:8px;margin:12px 0 4px;flex-wrap:wrap}
  .linkrow input{flex:1;min-width:200px;font-family:"Space Grotesk",sans-serif;font-size:12px;color:var(--slate);background:var(--line-2);border:1px solid var(--line);border-radius:7px;padding:7px 10px}
  .linkrow .btn{padding:7px 12px;font-size:12px}

  .vbody{display:none;margin-top:14px}
  .vend.open .vbody{display:block}
  .rtable{width:100%;overflow-x:auto}
  .rhead,.rrow{display:grid;grid-template-columns:.9fr 2.1fr .9fr .9fr .8fr .8fr;gap:10px;align-items:center;min-width:640px}
  .rhead{padding:8px 0;border-bottom:2px solid var(--line);font-family:"Space Grotesk",sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--navy)}
  .rrow{padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13px}
  .rrow img{width:34px;height:34px;object-fit:cover;border-radius:6px;background:var(--line-2)}
  .rrow .desccell{display:flex;align-items:center;gap:9px}
  .rrow .cor{color:var(--slate);font-size:12px}
  .rrow .tnum{text-align:right}
  .marcafilter{display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap}
  .mchip{font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid var(--line);background:var(--paper);color:var(--slate);cursor:pointer}
  .mchip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}

  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--mute);font-size:12px}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="cms-logo">CMS</div>
      <div class="brand-txt"><span class="brand-name">CMS Representações</span><span class="brand-sub">Estoque Virtual · Matriz Esportes · Admin</span></div>
    </div>
    <span class="spacer"></span>
    <button class="btn" id="refreshBtn">Atualizar</button>
    <button class="btn primary" id="exportBtn">Exportar .xlsx</button>
    <button class="theme-btn btn" id="themeBtn" type="button">◐</button>
  </div>

  <header class="hero">
    <h1>Estoque Virtual · Matriz Esportes</h1>
    <p class="lede">Sellout reportado por cada loja do grupo — estoque atual e vendas, por marca e produto.</p>
  </header>

  <div class="ksum-row" id="kpis"></div>

  <div class="section-title">Produtos pendentes de cadastro <span class="badge" id="pendBadge" hidden>0</span></div>
  <div id="pendList"></div>

  <div class="section-title" style="margin-top:38px">Lojas</div>
  <div id="lojasList"></div>

  <footer>Estoque Virtual · CMS Representações · ferramenta interna</footer>
</div>

<script>
const WORKER_URL = 'https://repasse-worker-cms.marcosrep-cms.workers.dev';
const IMG_BASE = '../imagens_olympikus/';
const LOJA_PAGE = 'loja.html';

let DATA = { lojas: [], pendentes: [] };

function $(id){ return document.getElementById(id); }
function imgUrl(artigo, cor){ return IMG_BASE + encodeURIComponent(artigo) + '_' + encodeURIComponent(cor) + '.jpg'; }
function fmtData(iso){
  if(!iso) return null;
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('matriz-theme', t); }
(function initTheme(){
  const saved = localStorage.getItem('matriz-theme');
  applyTheme(saved || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
})();
$('themeBtn').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
};

async function callWorker(body){
  const res = await fetch(WORKER_URL, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok || data.success === false) throw new Error(data.error || ('Erro ' + res.status));
  return data;
}

async function load(){
  try{
    const { data } = await callWorker({ action: 'getMatrizEstoque' });
    DATA = data && typeof data === 'object' ? data : { lojas: [], pendentes: [] };
    render();
  }catch(e){
    console.error(e);
    alert('Não foi possível carregar os dados: ' + e.message);
  }
}
$('refreshBtn').onclick = load;

function render(){
  renderKpis();
  renderPendentes();
  renderLojas();
}

function renderKpis(){
  const lojas = DATA.lojas || [];
  const totalItens = lojas.reduce((s,l) => s + Object.values(l.marcas||{}).reduce((s2,arr)=>s2+arr.length,0), 0);
  const pendAbertos = (DATA.pendentes||[]).filter(p => p.status === 'pendente').length;
  const naoAtualizadas = lojas.filter(l => !l.ultimaAtualizacaoLoja).length;

  $('kpis').innerHTML = `
    <div class="ksum"><div class="l">Lojas</div><div class="v tnum">${lojas.length}</div></div>
    <div class="ksum"><div class="l">Itens cadastrados</div><div class="v tnum">${totalItens}</div></div>
    <div class="ksum ${pendAbertos?'warn':''}"><div class="l">Pendentes de cadastro</div><div class="v tnum">${pendAbertos}</div></div>
    <div class="ksum ${naoAtualizadas?'warn':''}"><div class="l">Lojas sem envio</div><div class="v tnum">${naoAtualizadas}</div></div>
  `;
}

function renderPendentes(){
  const pend = (DATA.pendentes || []).slice().sort((a,b) => (b.criadoEm||'').localeCompare(a.criadoEm||''));
  const abertos = pend.filter(p => p.status === 'pendente');
  $('pendBadge').hidden = abertos.length === 0;
  $('pendBadge').textContent = abertos.length;

  if(pend.length === 0){
    $('pendList').innerHTML = `<div class="empty">Nenhum produto pendente de cadastro.</div>`;
    return;
  }

  $('pendList').innerHTML = pend.map(p => `
    <div class="pend ${p.status!=='pendente'?'resolved':''}" data-id="${p.id}">
      <div class="info">
        <b>${p.descricao} — ${p.cor}</b>
        <div class="sub">${p.lojaNome} · ${p.marca} · Artigo ${p.artigo}${p.status!=='pendente' ? ' · ' + (p.status==='aprovado'?'Aprovado':'Rejeitado') : ''}</div>
      </div>
      <div class="nums tnum">Estoque: ${p.estoqueAtual} · Venda: ${p.venda}</div>
      ${p.status === 'pendente' ? `
      <div class="acts">
        <button class="btn primary" data-act="aprovar">Marcar cadastrado</button>
        <button class="btn" data-act="rejeitar">Rejeitar</button>
      </div>` : ''}
    </div>
  `).join('');

  $('pendList').querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = async () => {
      const row = btn.closest('.pend');
      const id = row.dataset.id;
      const status = btn.dataset.act === 'aprovar' ? 'aprovado' : 'rejeitado';
      btn.closest('.acts').querySelectorAll('button').forEach(b => b.disabled = true);
      try{
        await callWorker({ action: 'resolverMatrizPendente', id, status });
        await load();
      }catch(e){
        alert('Erro: ' + e.message);
      }
    };
  });
}

function renderLojas(){
  const lojas = DATA.lojas || [];
  $('lojasList').innerHTML = lojas.map((l, i) => {
    const totalItens = Object.values(l.marcas||{}).reduce((s,arr)=>s+arr.length,0);
    const link = new URL(LOJA_PAGE, location.href).toString() + '?token=' + encodeURIComponent(l.token);
    const marcas = Object.keys(l.marcas || {});
    return `
    <div class="vend" id="vend-${i}">
      <div class="vhead" data-toggle="${i}">
        <div class="vindex tnum">${String(i+1).padStart(2,'0')}</div>
        <div class="vtitle"><h2>${l.nome}</h2><div class="sub">${l.cidade || ''}</div></div>
        <div class="vkpi"><div class="l">Itens</div><div class="v tnum">${totalItens}</div></div>
        <div class="vkpi">
          <div class="l">Último envio</div>
          <div class="v ${l.ultimaAtualizacaoLoja?'':'stale'}">${l.ultimaAtualizacaoLoja ? fmtData(l.ultimaAtualizacaoLoja) : 'Nunca enviado'}</div>
        </div>
        <div class="vchev">▾</div>
      </div>
      <div class="linkrow">
        <input readonly value="${link}">
        <button class="btn" data-copy="${link}">Copiar link</button>
      </div>
      <div class="vbody">
        <div class="marcafilter" id="mf-${i}">
          ${marcas.map((m,mi) => `<button class="mchip ${mi===0?'on':''}" data-marca="${m}">${m}</button>`).join('')}
        </div>
        <div class="rtable" id="rt-${i}"></div>
      </div>
    </div>`;
  }).join('');

  lojas.forEach((l, i) => {
    $('vend-'+i).querySelector('[data-toggle]').onclick = () => {
      $('vend-'+i).classList.toggle('open');
      renderTabelaLoja(i, l, Object.keys(l.marcas||{})[0]);
    };
    $('mf-'+i).querySelectorAll('.mchip').forEach(chip => {
      chip.onclick = () => {
        $('mf-'+i).querySelectorAll('.mchip').forEach(c => c.classList.remove('on'));
        chip.classList.add('on');
        renderTabelaLoja(i, l, chip.dataset.marca);
      };
    });
  });

  $('lojasList').querySelectorAll('[data-copy]').forEach(btn => {
    btn.onclick = async () => {
      try{ await navigator.clipboard.writeText(btn.dataset.copy); btn.textContent = 'Copiado!'; setTimeout(()=>btn.textContent='Copiar link',1500); }
      catch(_){ /* clipboard indisponível */ }
    };
  });
}

function renderTabelaLoja(i, loja, marca){
  const itens = (loja.marcas[marca] || []);
  $('rt-'+i).innerHTML = `
    <div class="rhead"><div>Imagem</div><div>Produto</div><div>Artigo</div><div>Cor</div><div class="tnum">Estoque</div><div class="tnum">Venda</div></div>
    ${itens.map(it => `
      <div class="rrow">
        <div><img src="${imgUrl(it.artigo,it.cor)}" loading="lazy" onerror="this.style.visibility='hidden'"></div>
        <div class="desccell">${it.descricao}</div>
        <div class="tnum">${it.artigo}</div>
        <div class="cor">${it.cor}</div>
        <div class="tnum">${it.estoqueAtual ?? 0}</div>
        <div class="tnum">${it.venda ?? 0}</div>
      </div>
    `).join('')}
  `;
}

$('exportBtn').onclick = () => {
  const rows = [];
  (DATA.lojas || []).forEach(l => {
    Object.entries(l.marcas || {}).forEach(([marca, itens]) => {
      itens.forEach(it => {
        rows.push({
          Loja: l.nome, Cidade: l.cidade, Marca: marca, Artigo: it.artigo,
          Descrição: it.descricao, Cor: it.cor, 'Estoque atual': it.estoqueAtual ?? 0,
          Venda: it.venda ?? 0, 'Último envio da loja': l.ultimaAtualizacaoLoja ? fmtData(l.ultimaAtualizacaoLoja) : ''
        });
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Estoque Matriz Esportes');
  const hoje = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `estoque_matriz_esportes_${hoje}.xlsx`);
};

load();
</script>
</body>
</html>
